<!DOCTYPE html>
<html>
<head>
    <title>House Price Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h1>California House Price Prediction</h1>

    <form id="predictForm">
        <input type="number" step="any" placeholder="Median Income" id="MedInc">
        <input type="number" step="any" placeholder="House Age" id="HouseAge">
        <input type="number" step="any" placeholder="Average Rooms" id="AveRooms">
        <input type="number" step="any" placeholder="Average Bedrooms" id="AveBedrms">
        <input type="number" step="any" placeholder="Population" id="Population">
        <input type="number" step="any" placeholder="Average Occupancy" id="AveOccup">
        <input type="number" step="any" placeholder="Latitude" id="Latitude">
        <input type="number" step="any" placeholder="Longitude" id="Longitude">
        <button type="submit">Predict</button>
    </form>

    <h2 id="result"></h2>
</div>

<script>
document.getElementById("predictForm").onsubmit = async (e) => {
    e.preventDefault();

    const data = {
        MedInc: +MedInc.value,
        HouseAge: +HouseAge.value,
        AveRooms: +AveRooms.value,
        AveBedrms: +AveBedrms.value,
        Population: +Population.value,
        AveOccup: +AveOccup.value,
        Latitude: +Latitude.value,
        Longitude: +Longitude.value
    };

    const response = await fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await response.json();
    document.getElementById("result").innerText =
        "Predicted Price: $" + result.predicted_price;
};
</script>
</body>
</html>
